<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>MyHostKit Demo</title>
<style>
:root{--accent:#C8965A;--dark:#141414;--dark2:#1E1E1E;--bg:#FAFAF8;--card:#FFFFFF;--text:#141414;--sub:#6B6B6B;--muted:#9B9B9B;--border:rgba(0,0,0,0.06);--success:#34C759;--error:#FF3B30;--blue:#1C5F8A}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;background:var(--dark);overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--text)}
#splash{position:absolute;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .5s}
#splash.hide{opacity:0;pointer-events:none}
#splash h1{font-size:28px;color:var(--accent);font-weight:800;margin-top:16px;letter-spacing:-.5px}
#splash p{font-size:13px;color:var(--muted);margin-top:6px}
.splash-logo{font-size:56px;animation:bounceIn .8s}
@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
#login{position:absolute;inset:0;background:var(--dark);display:none;flex-direction:column;z-index:90;overflow-y:auto;padding-top:50px}
.login-hdr{text-align:center;padding:16px 28px 12px}
.login-hdr h1{font-size:22px;color:#fff;font-weight:700;margin-bottom:4px}
.login-hdr p{font-size:12px;color:var(--muted)}
.login-body{padding:0 28px 30px;flex:1}
.role-sel{display:flex;gap:6px;margin-bottom:16px}
.role-btn{flex:1;padding:10px 4px;border-radius:12px;border:2px solid var(--dark2);background:var(--dark2);text-align:center;cursor:pointer;transition:all .2s}
.role-btn.on{border-color:var(--accent);background:rgba(200,150,90,.1)}
.role-btn .ri{font-size:20px;margin-bottom:3px;display:block}
.role-btn .rn{font-size:11px;font-weight:700;color:#fff;display:block}
.role-btn .rd{font-size:8px;color:var(--muted);margin-top:2px;display:block}
.linput{width:100%;padding:11px 14px;background:var(--dark2);border:1.5px solid rgba(255,255,255,.08);border-radius:12px;color:#fff;font-size:14px;margin-bottom:7px;outline:none;font-family:inherit}
.linput::placeholder{color:var(--muted)}
.linput:focus{border-color:var(--accent)}
.lbtn{width:100%;padding:13px;background:var(--accent);color:var(--dark);border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:5px;transition:transform .1s}
.lbtn:active{transform:scale(.97)}
.lswitch{text-align:center;margin-top:12px;font-size:12px;color:var(--muted)}
.lswitch span{color:var(--accent);font-weight:600;cursor:pointer}
.guest-sep{display:flex;align-items:center;gap:10px;margin:14px 0}
.guest-sep div{flex:1;height:1px;background:rgba(255,255,255,.08)}
.guest-sep span{font-size:10px;color:var(--muted)}
.guest-btn{width:100%;padding:11px;background:transparent;border:1.5px solid rgba(255,255,255,.12);border-radius:12px;color:rgba(255,255,255,.6);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
#app{position:absolute;inset:0;display:none;flex-direction:column;background:var(--bg)}
.app-hdr{background:var(--card);padding:44px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.app-hdr h2{font-size:16px;font-weight:700;color:var(--accent)}
.app-hdr-sub{font-size:10px;color:var(--muted);margin-top:1px}
.app-body{flex:1;overflow-y:auto;padding:10px}
.app-tabs{display:flex;background:var(--dark);border-top:1px solid var(--dark2);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,8px)}
.app-tab{flex:1;padding:7px 0;text-align:center;cursor:pointer;min-width:0}
.app-tab .ti{font-size:16px;opacity:.4;display:block}
.app-tab .tl{font-size:8px;font-weight:600;color:var(--muted);margin-top:2px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 2px}
.app-tab.on .ti{opacity:1}
.app-tab.on .tl{color:var(--accent)}
.card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:7px;border:1px solid var(--border)}
.card h3{font-size:12px;font-weight:700;margin-bottom:5px}
.card p{font-size:10px;color:var(--sub);line-height:1.6}
.badge{display:inline-block;font-size:7px;font-weight:700;padding:2px 6px;border-radius:100px}
.badge-g{background:rgba(200,150,90,.12);color:var(--accent)}
.badge-b{background:rgba(28,95,138,.12);color:var(--blue)}
.badge-s{background:rgba(52,199,89,.12);color:var(--success)}
.badge-r{background:rgba(255,59,48,.12);color:var(--error)}
.badge-p{background:rgba(155,89,182,.12);color:#9B59B6}
.btn{width:100%;padding:10px;background:var(--accent);color:var(--dark);border:none;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:5px}
.btn-s{background:var(--dark2);color:var(--accent)}
.result{display:flex;align-items:center;gap:8px;padding:7px 9px;background:var(--bg);border-radius:9px;margin-bottom:3px;border:1px solid var(--border)}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.result-name{font-size:11px;font-weight:600}
.result-meta{font-size:8px;color:var(--muted);margin-top:1px}
.search-input{width:100%;padding:10px 11px;background:var(--card);border:1.5px solid var(--border);border-radius:9px;font-size:12px;color:var(--text);margin-bottom:5px;outline:none;font-family:inherit}
.section-t{font-size:12px;font-weight:700;margin:12px 0 5px}
.trial-banner{background:#FFF4E6;border-radius:12px;padding:10px;margin-bottom:10px;border:1.5px solid rgba(200,150,90,.3);display:flex;align-items:center;gap:8px}
.trial-banner .tb-icon{font-size:20px}
.trial-banner h4{font-size:11px;font-weight:700;color:var(--accent)}
.trial-banner p{font-size:9px;color:#8B7355;margin-top:1px}
.prod-row{display:flex;align-items:center;gap:7px;padding:6px 7px;background:var(--bg);border-radius:7px;margin-bottom:3px;border:1px solid var(--border)}
.prod-name{font-size:10px;font-weight:600}
.prod-price{font-size:8px;color:var(--muted)}
.prod-btn{width:24px;height:24px;border-radius:7px;border:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer}
.cat-filter{display:flex;gap:3px;overflow-x:auto;margin-bottom:7px;padding-bottom:3px}
.cat-btn{padding:4px 9px;border-radius:7px;border:1px solid var(--border);background:var(--card);font-size:8px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;color:var(--text)}
.cat-btn.on{background:var(--accent);color:var(--dark);border-color:var(--accent)}
.msg-bubble{max-width:80%;padding:8px 11px;border-radius:13px;margin-bottom:3px;font-size:11px;line-height:1.5}
.msg-me{align-self:flex-end;background:var(--accent);color:#fff;margin-left:auto}
.msg-other{background:var(--card);border:1px solid var(--border)}
.msg-time{font-size:7px;color:var(--muted);margin-top:2px}
.star{color:#FFB800}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.setting-label{font-size:12px;font-weight:500}
.setting-val{font-size:11px;color:var(--muted)}
.logout-btn{width:100%;padding:11px;background:rgba(255,59,48,.1);border:1px solid rgba(255,59,48,.2);border-radius:12px;color:var(--error);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:12px;text-align:center}
.app-body::-webkit-scrollbar,#login::-webkit-scrollbar{width:2px}
.app-body::-webkit-scrollbar-thumb,#login::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:2px}
</style>
</head>
<body>
<div id="splash"><div class="splash-logo">🏠</div><h1>MyHostKit</h1><p>Chargement...</p></div>
<div id="login">
  <div class="login-hdr"><h1>🏠 MyHostKit</h1><p>Demo interactive</p></div>
  <div class="login-body">
    <div style="font-size:9px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px">Choisir un role</div>
    <div class="role-sel">
      <div class="role-btn on" onclick="selectRole('host',this)"><span class="ri">🏠</span><span class="rn">Hote</span><span class="rd">Conciergerie</span></div>
      <div class="role-btn" onclick="selectRole('cleaner',this)"><span class="ri">🧹</span><span class="rn">Menagere</span><span class="rd">Menage</span></div>
      <div class="role-btn" onclick="selectRole('guest',this)"><span class="ri">🌍</span><span class="rn">Voyageur</span><span class="rd">Sejour</span></div>
    </div>
    <input class="linput" placeholder="Email" value="demo@myhostkit.com">
    <input class="linput" type="password" placeholder="Mot de passe" value="demo123">
    <div id="signup-fields" style="display:none"><input class="linput" type="password" placeholder="Confirmer"><input class="linput" placeholder="Code parrainage (optionnel)"></div>
    <button class="lbtn" onclick="doLogin()" id="l-btn">Se connecter</button>
    <div class="lswitch" id="l-switch">Pas de compte ? <span onclick="toggleSignup()">Creer un compte</span></div>
    <div class="guest-sep"><div></div><span>ou</span><div></div></div>
    <button class="guest-btn" onclick="guestAccess()">🌍 Acces voyageur sans compte</button>
  </div>
</div>
<div id="app">
  <div class="app-hdr"><div><h2 id="hdr-title">Dashboard</h2><div class="app-hdr-sub" id="hdr-sub"></div></div><div id="hdr-right"></div></div>
  <div class="app-body" id="app-body"></div>
  <div class="app-tabs" id="app-tabs"></div>
</div>
<script>
var currentRole='host',isSignup=false;
setTimeout(function(){document.getElementById('splash').classList.add('hide');document.getElementById('login').style.display='flex';},1800);
function selectRole(r,el){currentRole=r;var b=document.querySelectorAll('.role-btn');for(var i=0;i<b.length;i++)b[i].classList.remove('on');el.classList.add('on');}
function toggleSignup(){isSignup=!isSignup;document.getElementById('signup-fields').style.display=isSignup?'block':'none';document.getElementById('l-btn').textContent=isSignup?'Creer mon compte':'Se connecter';document.getElementById('l-switch').innerHTML=isSignup?'Deja un compte ? <span onclick="toggleSignup()">Se connecter</span>':'Pas de compte ? <span onclick="toggleSignup()">Creer un compte</span>';}
function guestAccess(){currentRole='guest';enterApp();}
function doLogin(){enterApp();}
function enterApp(){document.getElementById('login').style.display='none';document.getElementById('app').style.display='flex';renderTabs();switchTab(currentRole==='host'?'dashboard':currentRole==='cleaner'?'planning':'home');}
function logout(){document.getElementById('app').style.display='none';document.getElementById('login').style.display='flex';}
function renderTabs(){var tabs=[];if(currentRole==='host')tabs=[{id:'dashboard',icon:'📊',label:'Accueil'},{id:'properties',icon:'🏠',label:'Logts'},{id:'menage',icon:'🧹',label:'Menage'},{id:'stock',icon:'📦',label:'Stock'},{id:'notifs',icon:'🔔',label:'Notifs'},{id:'messages',icon:'💬',label:'Msg'},{id:'settings',icon:'⚙️',label:'Profil'}];else if(currentRole==='cleaner')tabs=[{id:'planning',icon:'📋',label:'Plan'},{id:'dispo',icon:'📅',label:'Dispo'},{id:'rapport',icon:'📸',label:'Rapport'},{id:'cnotifs',icon:'🔔',label:'Notifs'},{id:'cmessages',icon:'💬',label:'Msg'},{id:'team',icon:'👥',label:'Equipe'},{id:'csettings',icon:'⚙️',label:'Profil'}];else tabs=[{id:'home',icon:'🏠',label:'Accueil'},{id:'infos',icon:'📋',label:'Infos'},{id:'concierge',icon:'🤖',label:'Concierge'}];var h='';for(var i=0;i<tabs.length;i++){var t=tabs[i];h+='<div class="app-tab" id="tab-'+t.id+'" onclick="switchTab(\''+t.id+'\')"><span class="ti">'+t.icon+'</span><span class="tl">'+t.label+'</span></div>';}document.getElementById('app-tabs').innerHTML=h;}
function switchTab(id){var tabs=document.querySelectorAll('.app-tab');for(var i=0;i<tabs.length;i++)tabs[i].classList.remove('on');var el=document.getElementById('tab-'+id);if(el)el.classList.add('on');if(currentRole==='cleaner'&&el)el.querySelector('.tl').style.color='var(--blue)';renderScreen(id);}
function setHeader(t,s,r){document.getElementById('hdr-title').textContent=t;document.getElementById('hdr-sub').textContent=s||'';document.getElementById('hdr-right').innerHTML=r||'';document.getElementById('hdr-title').style.color=currentRole==='cleaner'?'var(--blue)':'var(--accent)';}
function demoAlert(n){var m={1:'Rapport valide ! 45 EUR liberes.',2:'Reservation envoyee !',3:'Reservation validee !',4:'Disponibilite ajoutee !',5:'Rapport envoye ! Facture auto.',6:'Signalement envoye.'};alert(m[n]||'OK');}
function showResults(){var r=document.getElementById('search-results');if(r)r.style.display='block';}
function filterCat(el){var b=el.closest('.cat-filter').querySelectorAll('.cat-btn');for(var i=0;i<b.length;i++)b[i].classList.remove('on');el.classList.add('on');}
function renderScreen(id){var body=document.getElementById('app-body');var S={
dashboard:function(){setHeader('📊 Tableau de bord','Hote · Plan Pro');return '<div class="trial-banner"><div class="tb-icon">🎁</div><div><h4>Essai — 28 jours restants</h4><p>Acces complet.</p></div></div><div class="card"><h3>📊 Resume</h3><p>🏠 2 logements · 📋 3 reservations<br>⭐ 4.8 · 💰 2 840 EUR</p></div><div class="section-t">✅ Rapports a valider</div><div class="card"><div class="result"><div class="av" style="background:rgba(200,150,90,.15)">📸</div><div style="flex:1"><div class="result-name">Villa ST · 18/04</div><div class="result-meta">Marie D. · 6 photos</div></div><span class="badge badge-g">A valider</span></div><button class="btn" onclick="demoAlert(1)">✅ Valider</button></div><div class="section-t">📅 Prochains</div><div class="result"><div class="av" style="background:rgba(52,199,89,.15)">🧹</div><div style="flex:1"><div class="result-name">Appart Nice · 20/04</div><div class="result-meta">Sophie Clean</div></div><span class="badge badge-s">OK</span></div>';},
properties:function(){setHeader('🏠 Logements','2');return '<button class="btn" style="margin-bottom:8px">+ Ajouter</button><div class="card"><h3>🏠 Villa Saint Tropez</h3><p>📍 123 rue Plage<br>🛏 3ch · 📶 MaisonST<br>🔑 4821 · 🕐 In15h/Out11h</p><p style="color:var(--accent);margin-top:5px">📅 iCal Airbnb ✅</p><button class="btn btn-s">✏️ Modifier</button></div><div class="card"><h3>🏠 Appart Nice</h3><p>📍 45 prom. Anglais<br>🛏 2ch · 📶 AppartNice<br>🔑 9753</p><button class="btn btn-s">✏️ Modifier</button></div>';},
menage:function(){setHeader('🧹 Menageres','Marketplace');return '<input class="search-input" placeholder="📍 Ville" value="Nice"><input class="search-input" type="date" value="2026-04-20"><button class="btn" style="margin-bottom:8px" onclick="showResults()">🔍 Rechercher</button><div id="search-results" style="display:none"><div class="section-t">3 disponibles</div><div class="result" style="border:2px solid var(--accent)"><div class="av" style="background:#9B59B6;color:#fff">⭐</div><div style="flex:1"><div class="result-name">Marie Propre <span class="star">★</span>4.9</div><div class="result-meta">Nice · 18 EUR/h</div><div><span class="badge badge-p">⭐ PRIO</span></div></div></div><div class="result"><div class="av" style="background:var(--blue);color:#fff">🧹</div><div style="flex:1"><div class="result-name">Clean Express <span class="star">★</span>4.7</div><div class="result-meta">Nice · 15 EUR/h</div></div></div><div class="result"><div class="av" style="background:var(--bg)">🧹</div><div style="flex:1"><div class="result-name">Sophie <span class="star">★</span>4.5</div><div class="result-meta">Nice · 14 EUR/h</div></div></div><div class="card" style="margin-top:6px"><h3>📋 Reserver Marie</h3><input class="search-input" placeholder="Instructions..."><button class="btn" onclick="demoAlert(2)">📋 Reserver</button></div></div>';},
stock:function(){setHeader('📦 Stock','');return '<div class="card"><h3>Villa ST</h3><div class="prod-row"><span>🧴</span><div style="flex:1"><div class="prod-name">Multi-surface</div><div class="prod-price">2</div></div><span class="badge badge-g">OK</span></div><div class="prod-row"><span>🧻</span><div style="flex:1"><div class="prod-name">PQ x6</div><div class="prod-price">1</div></div><span class="badge badge-r">⚠</span></div><div class="prod-row"><span>☕</span><div style="flex:1"><div class="prod-name">Capsules</div><div class="prod-price">0</div></div><span class="badge badge-r">Vide</span></div><button class="btn">📦 Commander</button></div>';},
notifs:function(){setHeader('🔔 Notifications','');return '<div class="result"><div class="av" style="background:rgba(52,199,89,.15)">📸</div><div style="flex:1"><div class="result-name">Rapport recu</div><div class="result-meta">Villa ST · 2h</div></div></div><div class="result"><div class="av" style="background:rgba(28,95,138,.15)">💬</div><div style="flex:1"><div class="result-name">Message voyageur</div><div class="result-meta">Check-in ? · 5h</div></div></div><div class="result"><div class="av" style="background:rgba(200,150,90,.15)">💰</div><div style="flex:1"><div class="result-name">Paiement 45 EUR</div><div class="result-meta">hier</div></div></div>';},
messages:function(){setHeader('💬 Messages','');return '<div class="result" onclick="switchTab(\'chat_host\')"><div class="av" style="background:rgba(28,95,138,.15)">💬</div><div style="flex:1"><div class="result-name">Marie D.</div><div class="result-meta">Rapport · 2h</div></div><span class="badge badge-b">2</span></div><div class="result"><div class="av" style="background:rgba(200,150,90,.15)">🤖</div><div style="flex:1"><div class="result-name">IA</div><div class="result-meta">47 msg</div></div><span class="badge badge-s">Auto</span></div>';},
chat_host:function(){setHeader('💬 Marie D.','Villa ST','<span onclick="switchTab(\'messages\')" style="color:var(--accent);cursor:pointer;font-size:11px">←</span>');return '<div style="display:flex;flex-direction:column;gap:3px"><div class="msg-bubble msg-other"><div style="font-size:8px;color:var(--accent);font-weight:600">Marie</div>Menage OK ! 6 photos 📸<div class="msg-time">14h32</div></div><div class="msg-bubble msg-me">Merci, je valide.<div class="msg-time">14h45</div></div><div class="msg-bubble msg-other"><div style="font-size:8px;color:var(--accent);font-weight:600">Marie</div>Stock PQ bas.<div class="msg-time">14h48</div></div></div>';},
settings:function(){setHeader('⚙️ Profil','Hote');return '<div class="card" style="text-align:center"><div style="font-size:40px">👤</div><div style="font-size:14px;font-weight:700">Demo User</div><div style="font-size:10px;color:var(--muted)">demo@myhostkit.com</div><div style="margin-top:5px"><span class="badge badge-s">Pro · 89 EUR</span></div></div><div class="card"><div class="setting-row"><span class="setting-label">🏠 Role</span><span class="setting-val">Hote</span></div><div class="setting-row"><span class="setting-label">💳 Plan</span><span class="setting-val">Pro</span></div><div class="setting-row"><span class="setting-label">🎁 Code</span><span class="setting-val">MHK-DEMO</span></div></div><div class="logout-btn" onclick="logout()">🚪 Deconnexion</div>';},
