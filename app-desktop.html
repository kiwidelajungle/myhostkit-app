<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MyHostKit — Dashboard</title>
<meta name="theme-color" content="#141414">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAFAF8;--dark:#141414;--dark2:#1E1E1E;--dark3:#2A2A2A;--accent:#C8965A;--blue:#1C5F8A;--text:#EFEFEF;--sub:#A0A0A0;--muted:#666;--border:#333;--card:#1E1E1E;--success:#34C759;--error:#FF3B30;--warn:#FF9500;--font:'Plus Jakarta Sans',system-ui,sans-serif}
body{font-family:var(--font);background:var(--dark);color:var(--text);overflow:hidden;height:100vh}
input,select,textarea,button{font-family:var(--font)}
#root{height:100vh;width:100vw}

.auth-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--dark);padding:20px}
.auth-box{background:var(--dark2);border:1px solid var(--border);border-radius:20px;padding:36px;width:100%;max-width:420px}
.auth-logo{text-align:center;margin-bottom:20px}
.auth-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--accent);text-align:center;margin-bottom:20px}
.auth-error{display:none;background:rgba(255,59,48,.1);color:var(--error);padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px}
.auth-role{display:flex;gap:8px;margin-bottom:16px}
.auth-role-btn{flex:1;padding:14px 8px;border-radius:12px;border:2px solid var(--border);background:var(--dark3);text-align:center;cursor:pointer;transition:all .2s}
.auth-role-btn:hover{border-color:var(--accent)}
.auth-role-btn.on{border-color:var(--accent);background:rgba(200,150,90,.1)}
.auth-role-btn .ri{font-size:22px;display:block;margin-bottom:4px}
.auth-role-btn .rn{font-size:12px;font-weight:700;display:block}
.auth-input{width:100%;background:var(--dark);border:1px solid var(--border);border-radius:12px;padding:13px 16px;font-size:15px;color:var(--text);margin-bottom:10px;outline:none}
.auth-input:focus{border-color:var(--accent)}
.auth-btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}
.auth-btn:hover{opacity:.9}
.auth-btn:disabled{opacity:.5}
.auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--sub)}
.auth-switch span{color:var(--blue);cursor:pointer;font-weight:600}
.auth-forgot{text-align:center;margin-top:10px;font-size:12px;color:var(--accent);cursor:pointer}
.auth-pass-wrap{position:relative;margin-bottom:10px}
.auth-pass-wrap .eye{position:absolute;right:14px;top:13px;cursor:pointer;font-size:16px}
.auth-referral{background:rgba(200,150,90,.08);border:1px solid rgba(200,150,90,.2);border-radius:12px;padding:12px;margin-bottom:12px}
.auth-referral label{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:6px;display:block}
.auth-referral small{font-size:10px;color:#8B7355;margin-top:4px;display:block}

.app{display:flex;height:100vh}
.side{width:240px;background:var(--dark);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.side-hd{padding:16px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.side-logo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff}
.side-name{font-weight:800;font-size:16px}
.side-plan{font-size:9px;font-weight:700;background:var(--accent);color:#fff;padding:2px 8px;border-radius:20px;margin-left:auto;text-transform:uppercase}
.side-nav{flex:1;overflow-y:auto;padding:8px}
.side-sec{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.12em;padding:16px 12px 6px;text-transform:uppercase}
.sn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:none;border:none;color:var(--sub);font-size:13px;font-weight:500;cursor:pointer;width:100%;text-align:left;transition:all .15s}
.sn:hover{background:var(--dark2);color:var(--text)}
.sn.on{background:rgba(200,150,90,.12);color:var(--accent);font-weight:600}
.sn.on-blue{background:rgba(28,95,138,.15);color:var(--blue);font-weight:600}
.sn-icon{font-size:16px;width:22px;text-align:center}
.side-user{padding:12px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.side-av{width:34px;height:34px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.side-uname{font-size:12px;font-weight:600;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.side-uemail{font-size:10px;color:var(--muted);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.side-logout{margin-left:auto;cursor:pointer;font-size:18px;opacity:.5}
.side-logout:hover{opacity:1}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;background:var(--dark)}
.topbar h1{font-size:18px;font-weight:700}
.content{flex:1;overflow-y:auto;padding:24px;background:var(--dark2)}

.crd{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px}
.crd h3{font-size:14px;font-weight:700;margin-bottom:12px}
.row{display:grid;gap:12px}
.row2{grid-template-columns:1fr 1fr}
.row3{grid-template-columns:1fr 1fr 1fr}
.row4{grid-template-columns:1fr 1fr 1fr 1fr}
.kpi{background:var(--dark);border:1px solid var(--border);border-radius:12px;padding:14px}
.kpi-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.kpi-val{font-size:26px;font-weight:800}
.chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.cg{background:rgba(52,199,89,.12);color:var(--success)}
.co{background:rgba(255,149,0,.12);color:var(--warn)}
.cr{background:rgba(255,59,48,.12);color:var(--error)}
.cb{background:rgba(28,95,138,.12);color:var(--blue)}
.ca{background:rgba(200,150,90,.12);color:var(--accent)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:10px 12px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:1px solid var(--border)}
.tbl td{padding:10px 12px;border-bottom:1px solid rgba(51,51,51,.5)}
.tbl tr:hover{background:rgba(200,150,90,.03)}
.btn{padding:8px 18px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:8px}
.btn-danger{background:var(--error);color:#fff}
.btn:hover{opacity:.85}
.empty{text-align:center;padding:40px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.form-group{margin-bottom:12px}
.form-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;display:block}
.form-input{width:100%;background:var(--dark);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--text);outline:none}
.form-input:focus{border-color:var(--accent)}
textarea.form-input{resize:vertical;min-height:60px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--dark2);border:1px solid var(--border);border-radius:16px;padding:24px;width:90%;max-width:600px;max-height:85vh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px}
.tab-bar{display:flex;gap:4px;margin-bottom:16px;background:var(--dark);border-radius:10px;padding:4px}
.tab-btn{flex:1;padding:8px;border-radius:8px;border:none;background:none;color:var(--sub);font-size:12px;font-weight:600;cursor:pointer}
.tab-btn.on{background:var(--accent);color:#fff}
.progress-bar{height:6px;background:var(--dark);border-radius:3px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 120px)}
.chat-msgs{flex:1;overflow-y:auto;padding:16px}
.chat-bubble{max-width:70%;padding:12px 16px;border-radius:16px;margin-bottom:8px;font-size:14px;line-height:1.5}
.chat-me{background:var(--blue);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.chat-other{background:var(--dark);color:var(--text);border-bottom-left-radius:4px}
.chat-input-wrap{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border)}
.chat-input{flex:1;background:var(--dark);border:1px solid var(--border);border-radius:12px;padding:10px 16px;color:var(--text);font-size:14px;outline:none}
.chat-send{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:10px 20px;font-weight:700;cursor:pointer}
.loading{display:flex;align-items:center;justify-content:center;height:100vh;font-size:16px;color:var(--muted)}
.alert-bar{padding:10px 18px;border-radius:10px;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.alert-trial{background:rgba(200,150,90,.1);color:var(--accent);border:1px solid rgba(200,150,90,.2)}
.cal-day{display:inline-block;padding:8px 4px;text-align:center;border-radius:8px;cursor:pointer;font-size:12px;border:1px solid var(--border);min-width:60px}
.cal-day:hover{background:var(--dark3)}
.cal-day.today{border:2px solid var(--accent)}
.cal-day.available{background:rgba(52,199,89,.12)}
.cal-day.booked{background:rgba(28,95,138,.15)}
.checklist-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(51,51,51,.3);cursor:pointer}
.checklist-check{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px}
.checklist-check.done{background:var(--success);border-color:var(--success);color:#fff}
</style>
</head>
<body>
<div id="root"><div class="loading">Chargement...</div></div>
<script>
var SB_URL="https://illovwqvszjuasftwkxh.supabase.co";
var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsbG92d3F2c3pqdWFzZnR3a3hoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTk4NDQsImV4cCI6MjA5MDg5NTg0NH0.EMR86eBRtW9tF118YB1Xq2NL08FajJ7HLp51YwmF4_Y";
var EDGE=SB_URL+"/functions/v1";
var ADMIN_EMAIL="m.rayane8306@gmail.com";
var sb=supabase.createClient(SB_URL,SB_KEY);

var S={session:null,profile:null,role:null,view:"dashboard",loading:true,
  properties:[],bookings:[],allBookings:[],notifications:[],availability:[],
  cleanerId:null,cleanerProfile:null,items:[],favorites:{},favCleaners:[],
  teamMembers:[],teamGroups:[],
  chatMsgs:[],chatProp:null,
  guestProperty:null,guestMsgs:[],
  adminStats:{},adminUsers:[],adminBookings:[]};
var authMode="login",authRole="host",showPass=false;

async function init(){var d=await sb.auth.getSession();if(d.data.session){S.session=d.data.session;await loadProfile();await loadData();}S.loading=false;render();}
async function loadProfile(){var uid=S.session.user.id;var r=await sb.from("profiles").select("*").eq("id",uid).single();S.profile=r.data;S.role=r.data?r.data.role:"host";if(S.session.guestProperty){S.role="guest";S.guestProperty=S.session.guestProperty;}}

async function doLogin(){var e=$("ae").value.trim(),p=$("ap").value;if(!e||!p)return;$("aerr").style.display="none";$("abtn").disabled=true;
var r=await sb.auth.signInWithPassword({email:e,password:p});
if(r.error){showAuthErr(r.error.message);return;}
S.session=r.data.session;
var pr=await sb.from("profiles").select("role,subscription_plan").eq("id",r.data.session.user.id).single();
if(pr.data&&pr.data.role==="admin"){S.role="admin";}
else{if(pr.data){await sb.from("profiles").update({role:authRole}).eq("id",r.data.session.user.id);}else{await sb.from("profiles").upsert({id:r.data.session.user.id,email:e,role:authRole},{onConflict:"id"});}S.role=authRole;}
await loadProfile();S.view=S.role==="cleaner"?"planning":"dashboard";await loadData();render();}

async function doSignup(){var e=$("ae").value.trim(),p=$("ap").value,p2=$("ap2")?$("ap2").value:"";
if(!e||!p){showAuthErr("Email et mot de passe requis");return;}
if(p.length<6){showAuthErr("Min 6 caracteres");return;}
if(p!==p2){showAuthErr("Mots de passe differents");return;}
$("aerr").style.display="none";$("abtn").disabled=true;
var r=await sb.auth.signUp({email:e,password:p});
if(r.error){showAuthErr(r.error.message);return;}
if(r.data.session){
var myRef="MHK-"+r.data.session.user.id.substring(0,6).toUpperCase();
var pd={id:r.data.session.user.id,email:e,role:authRole,referral_code:myRef,subscription_plan:"trial",subscription_status:"active",trial_ends_at:new Date(Date.now()+30*86400000).toISOString()};
var refIn=$("aref")?$("aref").value.trim().toUpperCase():"";
if(refIn)pd.referred_by=refIn;
await sb.from("profiles").upsert(pd,{onConflict:"id"});
S.session=r.data.session;S.role=authRole;await loadProfile();S.view=authRole==="cleaner"?"planning":"dashboard";await loadData();render();
}else{showAuthErr("Verifiez votre email pour confirmer.");$("aerr").style.background="rgba(52,199,89,.1)";$("aerr").style.color="#34C759";$("abtn").disabled=false;}}

async function doGuestAccess(){var code=$("agc").value.trim();if(!code){showAuthErr("Entrez le code");return;}$("abtn").disabled=true;
var r=await sb.from("properties").select("*").eq("guest_token",code).single();
if(!r.data){showAuthErr("Code invalide");$("abtn").disabled=false;return;}
S.session={user:{id:"guest-"+r.data.id,email:"guest@myhostkit.com"},guestProperty:r.data};S.guestProperty=r.data;S.role="guest";S.view="home";render();}

async function doLogout(){await sb.auth.signOut();S.session=null;S.profile=null;S.role=null;S.guestProperty=null;render();}
async function doResetPassword(){var e=$("ae").value.trim();if(!e){alert("Entrez votre email");return;}var r=await sb.auth.resetPasswordForEmail(e);if(r.error)alert(r.error.message);else alert("Lien envoye a "+e);}
function toggleAuth(){authMode=authMode==="login"?"signup":"login";render();}
function selectAuthRole(r){authRole=r;render();}
function showAuthErr(m){$("aerr").textContent=m;$("aerr").style.display="block";$("aerr").style.background="rgba(255,59,48,.1)";$("aerr").style.color="var(--error)";$("abtn").disabled=false;}
function togglePass(){showPass=!showPass;var el=$("ap");if(el)el.type=showPass?"text":"password";var el2=$("ap2");if(el2)el2.type=showPass?"text":"password";}

async function loadData(){if(!S.session)return;var uid=S.session.user.id;
if(S.role==="host"||S.role==="admin"){
var r=await Promise.all([sb.from("properties").select("*").eq("user_id",uid),sb.from("cleaning_bookings").select("*,cleaners(company_name,contact_name,price_per_cleaning,email),properties(name)").eq("host_id",uid).order("date",{ascending:false}).limit(50),sb.from("notifications").select("*").eq("user_id",uid).order("created_at",{ascending:false}).limit(30)]);
S.properties=r[0].data||[];S.allBookings=r[1].data||[];S.notifications=r[2].data||[];
var today=new Date().toISOString().split("T")[0];S.bookings=S.allBookings.filter(function(b){return b.date>=today;});
var fav=await sb.from("favorites").select("cleaner_id").eq("host_id",uid);if(fav.data){S.favorites={};fav.data.forEach(function(f){S.favorites[f.cleaner_id]=true;});}
if(S.properties.length>0){var inv=await sb.from("inventory").select("*").eq("property_id",S.properties[0].id);S.items=inv.data||[];}
}else if(S.role==="cleaner"){
var cr=await sb.from("cleaners").select("*").eq("user_id",uid).single();
if(cr.data){S.cleanerId=cr.data.id;S.cleanerProfile=cr.data;
var r=await Promise.all([sb.from("cleaner_availability").select("*").eq("cleaner_id",cr.data.id),sb.from("cleaning_bookings").select("*,properties(name,address,city,user_id)").eq("cleaner_id",cr.data.id).order("date",{ascending:false}).limit(50),sb.from("notifications").select("*").eq("user_id",uid).order("created_at",{ascending:false}).limit(30)]);
S.availability=r[0].data||[];S.bookings=r[1].data||[];S.notifications=r[2].data||[];
var tm=await sb.from("team_members").select("*").eq("owner_id",uid);S.teamMembers=tm.data||[];
}else{S.cleanerProfile=null;}}
if(S.role==="admin")await loadAdminData();}

async function loadAdminData(){var st={};
var r=await sb.from("profiles").select("*").order("created_at",{ascending:false}).limit(200);var users=r.data||[];S.adminUsers=users;
st.totalUsers=users.length;st.hosts=users.filter(function(u){return u.role==="host";}).length;st.cleaners=users.filter(function(u){return u.role==="cleaner";}).length;st.admins=users.filter(function(u){return u.role==="admin";}).length;
st.planFree=users.filter(function(u){return !u.subscription_plan||u.subscription_plan==="free";}).length;st.planTrial=users.filter(function(u){return u.subscription_plan==="trial";}).length;st.planStarter=users.filter(function(u){return u.subscription_plan==="starter";}).length;st.planPro=users.filter(function(u){return u.subscription_plan==="pro";}).length;st.planBusiness=users.filter(function(u){return u.subscription_plan==="business";}).length;
var today=new Date().toISOString().split("T")[0];st.newToday=users.filter(function(u){return u.created_at&&u.created_at.startsWith(today);}).length;
var w=new Date(Date.now()-7*86400000).toISOString();st.newWeek=users.filter(function(u){return u.created_at>w;}).length;
var pr=await sb.from("properties").select("id",{count:"exact"});st.totalProperties=(pr.data||[]).length;
var br=await sb.from("cleaning_bookings").select("id,status,date").order("created_at",{ascending:false}).limit(100);var bd=br.data||[];S.adminBookings=bd;
st.totalBookings=bd.length;st.bookingsPending=bd.filter(function(b){return b.status==="pending";}).length;st.bookingsConfirmed=bd.filter(function(b){return b.status==="confirmed";}).length;st.bookingsDisputed=bd.filter(function(b){return b.status==="disputed";}).length;
S.adminStats=st;}

function render(){var root=$("root");if(S.loading){root.innerHTML="<div class='loading'>Chargement...</div>";return;}if(!S.session){root.innerHTML=renderAuth();return;}root.innerHTML=renderApp();} 
function $(id){return document.getElementById(id);}
function go(v){S.view=v;var c=$("vc");if(c)c.innerHTML=renderView();var tb=$("tb");if(tb){var T=getTitles();tb.querySelector("h1").textContent=T[v]||v;}}
function getPlan(){return S.profile?(S.profile.subscription_plan||S.profile.plan||"free"):"free";}
function getPlanLabel(p){return p==="trial"?"\ud83c\udf81 Essai":p==="pro"?"Pro":p==="starter"?"Starter":p==="business"?"Business":"Gratuit";}
function getTrialDays(){if(!S.profile||!S.profile.trial_ends_at)return 0;return Math.max(0,Math.ceil((new Date(S.profile.trial_ends_at)-new Date())/86400000));}

function renderAuth(){var isL=authMode==="login",isG=authRole==="guest";
var logo="<div class='auth-logo'><svg width='160' height='30' viewBox='0 0 160 30' fill='none'><circle cx='15' cy='15' r='14' fill='#C8965A'/><path d='M8.5 17.5V14.5L15 10L21.5 14.5V17.5C21.5 18.1 21 18.5 20.5 18.5H9.5C9 18.5 8.5 18.1 8.5 17.5Z' fill='#fff'/><text x='35' y='21' font-family='Plus Jakarta Sans,sans-serif' font-size='18' font-weight='800' fill='#fff'>MyHostKit</text><circle cx='148' cy='17' r='3.5' fill='#C8965A'/></svg></div>";
var rs="<div style='font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px'>"+(isL?"Se connecter en tant que":"Choisir un role")+"</div><div class='auth-role'><div class='auth-role-btn "+(authRole==="host"?"on":"")+"' onclick='selectAuthRole(\"host\")'><span class='ri'>\ud83d\udd11</span><span class='rn'>Hote</span></div><div class='auth-role-btn "+(authRole==="cleaner"?"on":"")+"' onclick='selectAuthRole(\"cleaner\")'><span class='ri'>\ud83e\uddf9</span><span class='rn'>Menage</span></div><div class='auth-role-btn "+(authRole==="guest"?"on":"")+"' onclick='selectAuthRole(\"guest\")'><span class='ri'>\u2708\ufe0f</span><span class='rn'>Voyageur</span></div></div>";
var h="<div class='auth-wrap'><div class='auth-box'>"+logo+"<div class='auth-title'>"+(isL?"Connexion":"Creer un compte")+"</div><div class='auth-sub'>Version desktop</div><div id='aerr' class='auth-error'></div>"+rs;

var r=await sb.from("properties").insert({user_id:S.session.user.id,name:name,type:$("pf-type").value,address:$("pf-addr").value.trim(),city:$("pf-city").value.trim(),rooms:parseInt($("pf-rooms").value)||null,capacity:parseInt($("pf-cap").value)||null,checkin:$("pf-ci").value,checkout:$("pf-co").value,check_in_time:$("pf-ci").value,check_out_time:$("pf-co").value,access_code:$("pf-code").value.trim(),access_info:$("pf-info").value.trim(),wifi_name:$("pf-wn").value.trim(),wifi_password:$("pf-wp").value.trim(),rules:$("pf-rules").value.trim(),contacts:$("pf-contacts").value.trim(),welcome_message:$("pf-welcome").value.trim(),ical_url:$("pf-ical").value.trim()||null,guest_token:token});

async function deleteProperty(id,name){if(!confirm("Supprimer "+name+" ?"))return;await sb.from("properties").delete().eq("id",id);await loadData();go("properties");}

setTimeout(function(){$("pf-name").value=p.name||"";$("pf-type").value=p.type||"Appartement";$("pf-addr").value=p.address||"";$("pf-city").value=p.city||"";$("pf-rooms").value=p.rooms||"";$("pf-cap").value=p.capacity||"";$("pf-ci").value=p.checkin||"15:00";$("pf-co").value=p.checkout||"11:00";$("pf-code").value=p.access_code||"";$("pf-info").value=p.access_info||"";$("pf-wn").value=p.wifi_name||"";$("pf-wp").value=p.wifi_password||"";$("pf-rules").value=p.rules||"";$("pf-contacts").value=p.contacts||"";$("pf-welcome").value=p.welcome_message||"";$("pf-ical").value=p.ical_url||"";
var btn=document.querySelector(".modal .btn-primary");if(btn){btn.textContent="Modifier";btn.onclick=async function(){
var r=await sb.from("properties").update({name:$("pf-name").value.trim(),type:$("pf-type").value,address:$("pf-addr").value.trim(),city:$("pf-city").value.trim(),rooms:parseInt($("pf-rooms").value)||null,capacity:parseInt($("pf-cap").value)||null,checkin:$("pf-ci").value,checkout:$("pf-co").value,check_in_time:$("pf-ci").value,check_out_time:$("pf-co").value,access_code:$("pf-code").value.trim(),access_info:$("pf-info").value.trim(),wifi_name:$("pf-wn").value.trim(),wifi_password:$("pf-wp").value.trim(),rules:$("pf-rules").value.trim(),contacts:$("pf-contacts").value.trim(),welcome_message:$("pf-welcome").value.trim(),ical_url:$("pf-ical").value.trim()||null}).eq("id",id);
if(r.error){alert(r.error.message);return;}closeModal();await loadData();go("properties");};}},100);}

async function validateBooking(id){if(!confirm("Valider ce menage ?"))return;await sb.from("cleaning_bookings").update({status:"validated",payment_released_at:new Date().toISOString()}).eq("id",id);await loadData();go("bookings");}
async function disputeBooking(id){if(!confirm("Contester ce menage ?"))return;await sb.from("cleaning_bookings").update({status:"disputed"}).eq("id",id);await loadData();go("bookings");}

async function selectChatProp(id){S.chatProp=S.properties.find(function(p){return p.id===id;});var r=await sb.from("host_guest_messages").select("*").eq("property_id",id).order("created_at",{ascending:true}).limit(100);S.chatMsgs=r.data||[];$("chat-area").innerHTML=renderChat();var msgs=$("host-chat-msgs");if(msgs)msgs.scrollTop=msgs.scrollHeight;}
async function sendHostMsg(){var input=$("host-chat-input");if(!input)return;var m=input.value.trim();if(!m||!S.chatProp)return;input.value="";await sb.from("host_guest_messages").insert({property_id:S.chatProp.id,sender_role:"host",sender_id:S.session.user.id,message:m});var r=await sb.from("host_guest_messages").select("*").eq("property_id",S.chatProp.id).order("created_at",{ascending:true}).limit(100);S.chatMsgs=r.data||[];$("chat-area").innerHTML=renderChat();var msgs=$("host-chat-msgs");if(msgs)msgs.scrollTop=msgs.scrollHeight;}

async function updateItemQty(id,delta){var item=S.items.find(function(i){return i.id===id;});if(!item)return;var nq=Math.max(0,item.quantity+delta);await sb.from("inventory").update({quantity:nq}).eq("id",id);item.quantity=nq;go("stock");}
function showAddItem(){document.body.insertAdjacentHTML("beforeend","<div class='modal-overlay' onclick='if(event.target===this)closeModal()'><div class='modal'><h2>Ajouter un article</h2><div class='form-group'><label class='form-label'>Nom</label><input class='form-input' id='si-name'></div><div class='row row3'><div class='form-group'><label class='form-label'>Categorie</label><select class='form-input' id='si-cat'><option value='hygiene'>Hygiene</option><option value='nettoyage'>Nettoyage</option><option value='literie'>Literie</option><option value='cuisine'>Cuisine</option><option value='accueil'>Accueil</option><option value='general'>General</option></select></div><div class='form-group'><label class='form-label'>Quantite</label><input class='form-input' id='si-qty' type='number' value='5'></div><div class='form-group'><label class='form-label'>Seuil min</label><input class='form-input' id='si-min' type='number' value='2'></div></div><div class='form-group'><label class='form-label'>Unite</label><input class='form-input' id='si-unit' value='unite'></div><button class='btn btn-primary' style='width:100%;margin-top:12px' onclick='addItem()'>Ajouter</button></div></div>");}
async function addItem(){if(!S.properties.length)return;await sb.from("inventory").insert({property_id:S.properties[0].id,item_name:$("si-name").value.trim(),category:$("si-cat").value,quantity:parseInt($("si-qty").value)||5,min_quantity:parseInt($("si-min").value)||2,unit:$("si-unit").value||"unite"});closeModal();await loadData();go("stock");}
async function quickAddItem(name,cat){if(!S.properties.length)return;await sb.from("inventory").insert({property_id:S.properties[0].id,item_name:name,category:cat,quantity:5,min_quantity:2,unit:"unite"});await loadData();go("stock");}

async function searchCleaners(){var date=$("mp-date").value,city=$("mp-city").value.trim();if(!date){alert("Selectionnez une date");return;}
$("mp-results").innerHTML="<div style='text-align:center;padding:20px;color:var(--muted)'>Recherche...</div>";
var r=await sb.from("cleaner_availability").select("*,cleaners(*)").eq("date",date).eq("is_available",true).eq("status","available");
var data=(r.data||[]).filter(function(a){return a.cleaners&&a.cleaners.active;});
if(city){var c=city.toLowerCase();data=data.filter(function(a){return a.cleaners.city&&a.cleaners.city.toLowerCase().indexOf(c)!==-1;});}
if(data.length===0){$("mp-results").innerHTML="<div class='empty'>Aucun service disponible</div>";return;}
var h="<div class='row row2'>";data.forEach(function(a){var cl=a.cleaners;var isFav=S.favorites[cl.id];
h+="<div class='crd'><div style='display:flex;justify-content:space-between;align-items:start'><div><strong>"+esc(cl.company_name||cl.contact_name)+"</strong>"+(cl.verified?"<span style='margin-left:6px;font-size:10px;color:var(--success)'>Verifie</span>":"")+"<div style='font-size:12px;color:var(--sub);margin-top:2px'>"+(cl.city||"")+"</div></div><span style='cursor:pointer;font-size:18px' onclick='toggleFav(\""+cl.id+"\")'>"+(isFav?"\u2b50":"\u2606")+"</span></div>"+(cl.bio?"<div style='font-size:12px;color:var(--sub);margin-top:8px'>"+esc(cl.bio.substring(0,100))+"</div>":"")+"<div style='display:flex;justify-content:space-between;align-items:center;margin-top:12px'><div style='font-size:16px;font-weight:700;color:var(--accent)'>"+(cl.price_per_cleaning||"\u2014")+"\u20ac/h</div><button class='btn btn-sm btn-primary' onclick='bookCleaner(\""+cl.id+"\",\""+date+"\",\""+esc(cl.company_name||cl.contact_name)+"\")'>Reserver</button></div></div>";});
h+="</div>";$("mp-results").innerHTML=h;}

async function bookCleaner(cid,date,name){if(!S.properties.length){alert("Ajoutez un logement");return;}if(!confirm("Reserver "+name+" le "+date+" ?"))return;
await sb.from("cleaning_bookings").insert({host_id:S.session.user.id,cleaner_id:cid,property_id:S.properties[0].id,date:date,status:"pending",time_slot:"08:00 - 12:00"});
alert("Reservation envoyee");await loadData();}
async function toggleFav(cid){var uid=S.session.user.id;if(S.favorites[cid]){await sb.from("favorites").delete().eq("host_id",uid).eq("cleaner_id",cid);delete S.favorites[cid];}else{await sb.from("favorites").insert({host_id:uid,cleaner_id:cid});S.favorites[cid]=true;}}

async function submitCleanerOnboarding(){var fn=$("co-fn").value.trim(),ln=$("co-ln").value.trim();if(!fn||!ln){alert("Prenom et nom obligatoires");return;}if(!$("co-em").value.trim()){alert("Email obligatoire");return;}if(!$("co-ci").value.trim()){alert("Ville obligatoire");return;}if(!$("co-ba").value.trim()){alert("Adresse facturation obligatoire");return;}
await sb.from("cleaners").insert({user_id:S.session.user.id,first_name:fn,last_name:ln,company_name:$("co-co").value.trim()||fn+" "+ln,contact_name:fn+" "+ln,email:$("co-em").value.trim(),phone:$("co-ph").value.trim(),city:$("co-ci").value.trim(),price_per_cleaning:parseFloat($("co-pr").value)||null,billing_address:$("co-ba").value.trim(),legal_status:$("co-ls").value.trim(),siret:$("co-si").value.trim(),bio:$("co-bio").value.trim(),billing_complete:true,active:true,verified:false});
alert("Profil cree");await loadData();go("planning");}

async function toggleDispo(date){if(!S.cleanerId)return;var ex=S.availability.find(function(a){return a.date===date;});
if(ex){await sb.from("cleaner_availability").delete().eq("id",ex.id);}else{await sb.from("cleaner_availability").insert({cleaner_id:S.cleanerId,date:date,is_available:true,status:"available",time_start:"08:00",time_end:"18:00"});}
var r=await sb.from("cleaner_availability").select("*").eq("cleaner_id",S.cleanerId);S.availability=r.data||[];go("dispo");}

async function sendReport(bid){var note=prompt("Commentaire (optionnel) :");await sb.from("cleaning_bookings").update({status:"report_sent",report_sent:true,report_note:note||"",report_sent_at:new Date().toISOString(),auto_validate_at:new Date(Date.now()+48*3600000).toISOString()}).eq("id",bid);alert("Rapport envoye");await loadData();go("rapport");}
function toggleCheck(key){if(!window._chk)window._chk={};window._chk[key]=!window._chk[key];go("checklist");}
function showAddTeamMember(){var email=prompt("Email du membre :");if(!email)return;var name=prompt("Nom :");addTeamMember(email,name||email.split("@")[0]);}
async function addTeamMember(email,name){await sb.from("team_members").insert({owner_id:S.session.user.id,member_email:email,member_name:name});await loadData();go("team");}
async function removeTeamMember(id){if(!confirm("Retirer ?"))return;await sb.from("team_members").delete().eq("id",id);await loadData();go("team");}

async function sendConcierge(){var input=$("concierge-input");if(!input)return;var msg=input.value.trim();if(!msg)return;input.value="";
if(!S.guestMsgs)S.guestMsgs=[];S.guestMsgs.push({role:"user",text:msg});go("concierge");
var p=S.guestProperty||{};var sp="Tu es le concierge IA MyHostKit du logement \""+esc(p.name||"Logement")+"\". Tu reponds en francais. Adresse : "+(p.address||"")+" "+(p.city||"")+" WiFi : "+(p.wifi_name||"?")+" / "+(p.wifi_password||"?")+" Code : "+(p.access_code||"?")+" Check-in : "+(p.checkin||"15:00")+" Check-out : "+(p.checkout||"11:00")+" Regles : "+(p.rules||"Aucune")+" Ne dis jamais que tu es une IA.";
try{var r=await fetch(EDGE+"/ai-concierge",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+SB_KEY},body:JSON.stringify({message:msg,systemPrompt:sp})});var d=await r.json();S.guestMsgs.push({role:"assistant",text:d.response||d.reply||"Desole, erreur."});}catch(e){S.guestMsgs.push({role:"assistant",text:"Service indisponible."});}
go("concierge");var msgs=$("concierge-msgs");if(msgs)msgs.scrollTop=msgs.scrollHeight;}

function sendIncident(){var text=$("incident-text").value.trim();if(!text){alert("Decrivez le probleme");return;}var p=S.guestProperty||{};
window.open("mailto:myhostkit.contact@gmail.com?subject="+encodeURIComponent("Incident : "+(p.name||""))+"&body="+encodeURIComponent("Logement : "+(p.name||"")+"\n"+(p.address||"")+"\n\n"+text));alert("Signalement envoye");$("incident-text").value="";}

function editProfile(){var p=S.profile||{};document.body.insertAdjacentHTML("beforeend","<div class='modal-overlay' onclick='if(event.target===this)closeModal()'><div class='modal'><h2>Modifier le profil</h2><div class='row row2'><div class='form-group'><label class='form-label'>Prenom</label><input class='form-input' id='ep-fn' value='"+esc(p.first_name||"")+"'></div><div class='form-group'><label class='form-label'>Nom</label><input class='form-input' id='ep-ln' value='"+esc(p.last_name||"")+"'></div></div><div class='form-group'><label class='form-label'>Telephone</label><input class='form-input' id='ep-ph' value='"+esc(p.phone||"")+"'></div><div class='form-group'><label class='form-label'>Entreprise</label><input class='form-input' id='ep-co' value='"+esc(p.company_name||"")+"'></div><div class='row row3'><div class='form-group'><label class='form-label'>Adresse</label><input class='form-input' id='ep-ba' value='"+esc(p.billing_address||"")+"'></div><div class='form-group'><label class='form-label'>Ville</label><input class='form-input' id='ep-bc' value='"+esc(p.billing_city||"")+"'></div><div class='form-group'><label class='form-label'>CP</label><input class='form-input' id='ep-bz' value='"+esc(p.billing_zip||"")+"'></div></div><div class='form-group'><label class='form-label'>SIRET</label><input class='form-input' id='ep-si' value='"+esc(p.siret||"")+"'></div><button class='btn btn-primary' style='width:100%;margin-top:12px' onclick='saveProfile()'>Sauvegarder</button></div></div>");}
async function saveProfile(){await sb.from("profiles").update({first_name:$("ep-fn").value.trim(),last_name:$("ep-ln").value.trim(),phone:$("ep-ph").value.trim(),company_name:$("ep-co").value.trim(),billing_address:$("ep-ba").value.trim(),billing_city:$("ep-bc").value.trim(),billing_zip:$("ep-bz").value.trim(),siret:$("ep-si").value.trim()}).eq("id",S.session.user.id);closeModal();await loadProfile();go("settings");}
async function deleteAccount(){if(!confirm("Supprimer votre compte ? Irreversible."))return;if(!confirm("DERNIERE CHANCE ?"))return;await sb.from("properties").delete().eq("user_id",S.session.user.id);await sb.from("profiles").delete().eq("id",S.session.user.id);await doLogout();alert("Compte supprime.");}

async function adminChangePlan(uid,email){var plan=prompt("Nouveau plan pour "+email+" ?\n(free/trial/starter/pro/business)");if(!plan)return;await sb.from("profiles").update({subscription_plan:plan,subscription_status:"active"}).eq("id",uid);alert(email+" -> "+plan);await loadAdminData();go("admin-users");}
async function adminExtendTrial(uid,email){var pr=await sb.from("profiles").select("trial_ends_at").eq("id",uid).single();var end=(pr.data&&pr.data.trial_ends_at)?new Date(pr.data.trial_ends_at):new Date();if(end<new Date())end=new Date();end.setDate(end.getDate()+30);await sb.from("profiles").update({subscription_plan:"trial",trial_ends_at:end.toISOString(),subscription_status:"active",trial_email_j7_sent:false,trial_email_j1_sent:false,trial_email_end_sent:false}).eq("id",uid);alert(email+" +30j");await loadAdminData();go("admin-users");}
function filterAdminUsers(){var q=$("au-search").value.toLowerCase();document.querySelectorAll("#au-tbody tr").forEach(function(r){r.style.display=r.textContent.toLowerCase().indexOf(q)!==-1?"":"none";});}
async function refreshAdminData(){await loadAdminData();go("admin-users");}
async function adminForceValidate(id){if(!confirm("Forcer ?"))return;await sb.from("cleaning_bookings").update({status:"validated",payment_released_at:new Date().toISOString()}).eq("id",id);alert("Valide");await loadAdminData();go("admin-bookings");}
async function adminResolve(id,decision){if(decision==="refund"){await sb.from("cleaning_bookings").update({status:"refunded",dispute_resolved_at:new Date().toISOString()}).eq("id",id);alert("Rembourse");}else{await sb.from("cleaning_bookings").update({status:"validated",payment_released_at:new Date().toISOString(),dispute_resolved_at:new Date().toISOString()}).eq("id",id);alert("Libere");}await loadAdminData();go("admin-bookings");}
async function adminResetPassword(){var email=$("as-email").value.trim();if(!email)return;var r=await sb.auth.resetPasswordForEmail(email);if(r.error)alert(r.error.message);else alert("Lien envoye a "+email);}
async function adminSetPlan(plan){var email=$("as-email2").value.trim();if(!email)return;var upd={subscription_plan:plan,subscription_status:"active"};if(plan==="trial"){upd.trial_started_at=new Date().toISOString();upd.trial_ends_at=new Date(Date.now()+30*86400000).toISOString();}await sb.from("profiles").update(upd).eq("email",email);alert(email+" -> "+plan);}
async function adminSendEmail(){var to=$("as-to").value.trim(),subj=$("as-subj").value.trim(),body=$("as-body").value.trim();if(!to||!subj)return;var r=await fetch(EDGE+"/send-email",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({to:to,subject:subj,body:body||"Support MyHostKit"})});var d=await r.json();if(d.success){alert("Envoye");$("as-subj").value="";$("as-body").value="";}else alert("Erreur");}

function closeModal(){var m=document.querySelector(".modal-overlay");if(m)m.remove();}
function esc(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
function syncIcal(id){alert("Synchronisation iCal lancee pour ce logement. Les reservations seront importees.");}

init();

</script>
